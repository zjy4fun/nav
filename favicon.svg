<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0d1117"/>
  <!-- Compass ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#21262d" stroke-width="3"/>
  <!-- Cardinal ticks -->
  <line x1="32" y1="10" x2="32" y2="15" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="49" x2="32" y2="54" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="32" x2="15" y2="32" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  <line x1="49" y1="32" x2="54" y2="32" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  <!-- Needle - north (blue) -->
  <polygon points="32,16 28,32 32,30 36,32" fill="#58a6ff"/>
  <!-- Needle - south (muted) -->
  <polygon points="32,48 28,32 32,34 36,32" fill="#484f58"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#f0f6fc"/>
</svg>
